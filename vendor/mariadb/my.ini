# Configuración de MariaDB Portable para Kiosco POS
# Optimizada para hardware limitado: PCs con 4GB RAM y discos mecánicos
# Ticket 12 — Preparación del Bundle de Binarios (Portable MariaDB)

[client]
port=3306
default-character-set=utf8mb4

[mysqld]
# Red
port=3306
bind-address=127.0.0.1

# Rutas (relativas al directorio de instalación)
datadir=../data

# Charset
character-set-server=utf8mb4
collation-server=utf8mb4_unicode_ci

# InnoDB — buffer pool ajustado para 4GB RAM con disco mecánico
# Aumentar a 256MB solo si el equipo tiene 8GB+ de RAM y SSD
innodb_buffer_pool_size=128M
innodb_flush_log_at_trx_commit=1
innodb_log_file_size=48M

# Conexiones — máximo 10 para uso mono-terminal en kiosco
max_connections=10

# Logs de errores
log_error=../logs/mariadb_error.log

# Deshabilitar funciones no utilizadas
skip-name-resolve
skip-networking=0
