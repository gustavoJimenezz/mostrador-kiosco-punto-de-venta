<script src="https://cdn.tailwindcss.com"></script>
<body class="bg-[#F8FAFC] h-screen flex p-8 gap-8 font-sans">
    <div class="flex-grow flex flex-col">
        <div class="flex items-center gap-4 mb-6">
            <div class="bg-emerald-500 p-4 rounded-2xl shadow-lg shadow-emerald-200">
                <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6 text-white" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 4v16m8-8H4" />
                </svg>
            </div>
            <input type="text" placeholder="F2 - Escanear o buscar producto..." class="w-full bg-white border-none rounded-2xl px-6 py-5 text-xl shadow-sm focus:ring-2 focus:ring-emerald-500 outline-none transition-all">
        </div>

        <div class="flex-grow bg-white rounded-[2rem] shadow-sm border border-slate-100 overflow-hidden flex flex-col">
            <div class="p-8 border-b border-slate-50 flex justify-between text-slate-400 font-bold text-xs tracking-widest">
                <span>DETALLE DEL PRODUCTO</span>
                <div class="flex gap-20">
                    <span>CANT.</span>
                    <span>TOTAL</span>
                </div>
            </div>
            <div class="flex-grow flex items-center justify-center">
                <p class="text-slate-300 text-lg italic">Esperando productos...</p>
            </div>
        </div>
    </div>

    <div class="w-[400px] flex flex-col gap-6">
        <div class="bg-white rounded-[2rem] p-10 border border-slate-100 shadow-sm flex flex-col items-center">
            <span class="text-slate-400 font-medium mb-1">Total de la venta</span>
            <div class="text-7xl font-black text-slate-800 tabular-nums">$0,00</div>
        </div>

        <div class="grid grid-cols-2 gap-4">
            <button class="bg-white hover:bg-slate-50 border border-slate-100 p-6 rounded-3xl transition-all group">
                <span class="block text-emerald-500 font-bold text-sm mb-1 group-hover:scale-110 transition-transform text-left">F1</span>
                <span class="text-slate-600 font-semibold block text-left text-sm uppercase">Nueva</span>
            </button>
            <button class="bg-white hover:bg-slate-50 border border-slate-100 p-6 rounded-3xl transition-all group">
                <span class="block text-emerald-500 font-bold text-sm mb-1 group-hover:scale-110 transition-transform text-left">F2</span>
                <span class="text-slate-600 font-semibold block text-left text-sm uppercase">Buscar</span>
            </button>
            <button class="bg-white hover:bg-slate-50 border border-slate-100 p-6 rounded-3xl transition-all group">
                <span class="block text-red-400 font-bold text-sm mb-1 group-hover:scale-110 transition-transform text-left">F10</span>
                <span class="text-slate-600 font-semibold block text-left text-sm uppercase">Cierre</span>
            </button>
            <button class="bg-slate-800 hover:bg-slate-900 p-6 rounded-3xl transition-all group shadow-xl shadow-slate-200">
                <span class="block text-white/50 font-bold text-sm mb-1 text-left italic">F4</span>
                <span class="text-white font-bold block text-left text-sm uppercase">Cobrar</span>
            </button>
        </div>

        <div class="mt-auto bg-emerald-50 p-6 rounded-3xl border border-emerald-100">
            <div class="flex justify-between items-center text-emerald-700">
                <span class="text-xs font-bold uppercase tracking-wider">Caja abierta</span>
                <span class="text-sm font-mono">14:30 PM</span>
            </div>
        </div>
    </div>
</body>
